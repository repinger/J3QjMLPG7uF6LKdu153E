<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login - Monitorr</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>
		<script
			src="https://challenges.cloudflare.com/turnstile/v0/api.js"
			async
			defer
		></script>

		<style>
			:root {
				--primary: #4f46e5;
				--primary-dark: #4338ca;
				--text-main: #0f172a;
				--text-sub: #64748b;
				--border: #e2e8f0;
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				font-family: "Plus Jakarta Sans", sans-serif;
				height: 100vh;
				display: flex;
				overflow: hidden;
			}

			.split-left {
				flex: 1;
				background-color: var(--primary);
				background-image:
					linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
					linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
				background-size: 40px 40px;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
				padding: 3rem;
				color: white;
			}
			.brand-large {
				font-size: 1.5rem;
				font-weight: 700;
				display: flex;
				align-items: center;
				gap: 10px;
			}
			.quote {
				font-size: 2rem;
				font-weight: 700;
				line-height: 1.2;
				margin-bottom: 1rem;
			}

			.split-right {
				flex: 1;
				background: #ffffff;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 2rem;
			}
			.form-container {
				width: 100%;
				max-width: 400px;
			}

			.form-group {
				margin-bottom: 1.25rem;
			}
			label {
				display: block;
				margin-bottom: 0.5rem;
				font-weight: 600;
				font-size: 0.9rem;
				color: var(--text-main);
			}
			.input-wrapper {
				position: relative;
			}
			.input-wrapper i {
				position: absolute;
				left: 16px;
				top: 50%;
				transform: translateY(-50%);
				color: #94a3b8;
				pointer-events: none;
			}
			input {
				width: 100%;
				padding: 0.9rem 1rem 0.9rem 3rem;
				border: 1.5px solid var(--border);
				border-radius: 10px;
				font-size: 1rem;
			}
			input:focus {
				outline: none;
				border-color: var(--primary);
				box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
			}

			button {
				width: 100%;
				padding: 1rem;
				background: var(--primary);
				color: white;
				border: none;
				border-radius: 10px;
				font-weight: 600;
				cursor: pointer;
				margin-top: 1rem;
			}
			button:hover {
				background: var(--primary-dark);
			}

			.captcha-container {
				margin-top: 1.5rem;
				display: flex;
				justify-content: center;
			}
			.error {
				background: #fef2f2;
				color: #991b1b;
				padding: 12px;
				border-radius: 8px;
				margin-top: 1rem;
				display: none;
				text-align: center;
			}

			@media (max-width: 900px) {
				.split-left {
					display: none;
				}
			}
		</style>
	</head>
	<body>
		<div class="split-left">
			<div class="brand-large">
				<i class="fas fa-satellite-dish"></i> Monitorr
			</div>
			<div>
				<div class="quote">Enterprise Network Monitoring.</div>
				<div style="opacity: 0.8">
					Secure and Real-time Infrastructure Insight.
				</div>
			</div>
			<div style="font-size: 0.85rem; opacity: 0.6">
				&copy; 2026 IT Infrastructure Dept.
			</div>
		</div>

		<div class="split-right">
			<div class="form-container">
				<div style="margin-bottom: 2.5rem">
					<h2 style="font-size: 1.8rem; margin: 0; color: #0f172a">
						Welcome Back
					</h2>
					<div style="color: #64748b">Please sign in to your account.</div>
				</div>

				<form id="loginForm">
					<div class="form-group">
						<label>Username / Email</label>
						<div class="input-wrapper">
							<i class="fas fa-user"></i>
							<input
								type="text"
								id="username"
								placeholder="ID"
							/>
						</div>
					</div>
					<div class="form-group">
						<label>Password</label>
						<div class="input-wrapper">
							<input
								type="password"
								id="password"
								placeholder="••••••••"
								required
							/>
							<i class="fas fa-lock"></i>
						</div>
					</div>

					<div class="captcha-container">
						<div
							class="cf-turnstile"
							data-sitekey="0x4AAAAAACS8-Z3nEddcM630"
							data-theme="light"
						></div>
					</div>

					<button type="submit">Sign In</button>
					<div id="errorMsg" class="error"></div>
				</form>

				<div
					style="
						margin-top: 2rem;
						text-align: center;
						font-size: 0.85rem;
						color: #64748b;
					"
				>
					Protected System. Authorized Access Only.<br />Contact administrator
					for support.
				</div>
			</div>
		</div>

		<script>
			document
				.getElementById("loginForm")
				.addEventListener("submit", async (e) => {
					e.preventDefault();
					const u = document.getElementById("username").value;
					const p = document.getElementById("password").value;
					const formData = new FormData(e.target);
					const token = formData.get("cf-turnstile-response");
					const btn = e.target.querySelector("button");
					const err = document.getElementById("errorMsg");

					if (!token) {
						err.innerText = "Please complete security check.";
						err.style.display = "block";
						return;
					}

					btn.disabled = true;
					btn.innerHTML =
						'<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
					err.style.display = "none";

					try {
						const res = await fetch("/auth/login", {
							method: "POST",
							headers: { "Content-Type": "application/json" },
							body: JSON.stringify({
								username: u,
								password: p,
								turnstileToken: token,
							}),
						});
						const data = await res.json();
						if (data.success) {
							window.location.href = "/";
						} else {
							throw new Error(data.message || "Invalid Credentials");
						}
					} catch (e) {
						err.innerText = e.message;
						err.style.display = "block";
						btn.disabled = false;
						btn.innerText = "Sign In";
						if (window.turnstile) turnstile.reset();
					}
				});
		</script>
	</body>
</html>
